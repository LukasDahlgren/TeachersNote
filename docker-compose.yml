version: "3.9"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: teachersnote
      MYSQL_USER: ${DB_USER:-tn}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tnpass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-tn}
      DB_PASSWORD: ${DB_PASSWORD:-tnpass}
      DB_NAME: teachersnote
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_SECRET: ${ADMIN_SECRET}
      ALLOWED_ORIGINS: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - backend_generated:/app/generated
      - backend_source_pdfs:/app/source_pdfs

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
  backend_generated:
  backend_source_pdfs:
